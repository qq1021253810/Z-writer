server:
  port: 8080

spring:
  application:
    name: zwriter-backend
  profiles:
    active: llm

  datasource:
    url: jdbc:postgresql://localhost:5432/zwriter
    username: zwriter
    password: zwriter123
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  data:
    redis:
      host: localhost
      port: 6379

  ai:
    ollama:
      base-url: http://localhost:11434
      chat:
        model: qwen3:1.7b
      embedding:
        model: nomic-embed-text
    vectorstore:
      chroma:
        host: localhost
        port: 8000
        collection-name: zwriter_novels
        initialize-schema: true

# LLM Config
llm:
  provider: dashscope
  mock-enabled: false
  max-tokens: 4096
  temperature: 0.8
  dashscope:
    api-key: ${DASHSCOPE_API_KEY:sk-ws-H.RPIDRDI.SZsB.MEQCIBP_NEESKY85IHpqDJS3WpD5f-MijSFuLs_FcROV6vdPAiA0hc5Hw2p3qCp2lIoNEkl7-VKqBpUzdB86U7o6oPS2RQ}
    base-url: https://dashscope.aliyuncs.com/compatible-mode
    model: qwen-plus

logging:
  level:
    com.zwriter: DEBUG
    org.springframework.ai: DEBUG
