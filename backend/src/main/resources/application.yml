server:
  port: 8080

spring:
  application:
    name: zwriter-backend
  ai:
    openai:
      api-key: ${DASHSCOPE_API_KEY}
      base-url: https://dashscope.aliyuncs.com/compatible-mode
      chat:
        options:
          model: qwen-plus
          temperature: 0.8
          max-tokens: 4096
    ollama:
      base-url: http://localhost:11434
      chat:
        options:
          model: qwen3:8b
          temperature: 0.8
          max-tokens: 4096

# Z-Writer Config
zwriter:
  workspace:
    base-path: ./workspaces
  wiki:
    builtin-path: ./wiki

logging:
  level:
    com.zwriter: DEBUG
    org.springframework.ai: DEBUG
