server:
  port: 8080

spring:
  application:
    name: zwriter-backend
  profiles:
    active: llm

  ai:
    ollama:
      base-url: http://localhost:11434
      chat:
        model: qwen3:1.7b
      embedding:
        model: nomic-embed-text

# LLM Config
llm:
  provider: dashscope
  mock-enabled: false
  max-tokens: 4096
  temperature: 0.8
  dashscope:
    api-key: ${DASHSCOPE_API_KEY:api-key}
    base-url: https://dashscope.aliyuncs.com/compatible-mode/v1
    model: qwen-plus

# Z-Writer Config
zwriter:
  workspace:
    base-path: ./workspaces
  wiki:
    builtin-path: ./wiki

logging:
  level:
    com.zwriter: DEBUG
    org.springframework.ai: DEBUG
