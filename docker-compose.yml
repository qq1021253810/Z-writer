version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: zwriter-pg
    environment:
      POSTGRES_USER: zwriter
      POSTGRES_PASSWORD: zwriter123
      POSTGRES_DB: zwriter
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U zwriter"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: zwriter-redis
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  chroma:
    image: chromadb/chroma:latest
    container_name: zwriter-chroma
    ports:
      - "8000:8000"
    volumes:
      - chromadata:/chroma/chroma
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/heartbeat"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
  redisdata:
  chromadata:
